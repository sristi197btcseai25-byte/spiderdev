<!DOCTYPE html>
<html>
<head>
    <title>Shadi.com Profile Form</title>
</head>

<body style="font-family:Arial; background-color:#ffe6e6;">

    <center>
        <h1 style="color:#d6004c;">Shadi.com</h1>
        <h2>Create Your Profile</h2>
    </center>

    <form style="background:white; width:400px; margin:auto; padding:20px; border-radius:10px;">

        <label>Full Name:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Interests:</label><br>
        <input type="checkbox"> Music<br>
        <input type="checkbox"> Travel<br>
        <input type="checkbox"> Reading<br><br>

        <label>Upload Photo:</label><br>
        <input type="file"><br><br>

        <input type="submit" value="Create Profile"
               style="background:#d6004c; color:white; padding:10px;">

    </form>

</body>
</html>
